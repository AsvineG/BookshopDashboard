name: Refresh Bookshop Data

on:
  workflow_dispatch:
    inputs:
      full_refresh:
        description: 'Force full refresh?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and sanitise BigCommerce data
        env:
          BC_STORE_HASH: ${{ secrets.BC_STORE_HASH }}
          BC_CLIENT_ID: ${{ secrets.BC_CLIENT_ID }}
          BC_ACCESS_TOKEN: ${{ secrets.BC_ACCESS_TOKEN }}
          FULL_REFRESH: ${{ inputs.full_refresh }}
        run: python3 fetch_data.py

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.csv
          if git diff --staged --quiet; then
            echo "No changes — already up to date."
          else
            TIMESTAMP=$(TZ='Australia/Sydney' date '+%Y-%m-%d %H:%M AEST')
            git commit -m "Auto-refresh data — ${TIMESTAMP}"
            git push
            echo "Committed and pushed."
          fi
